<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Synthèse + AM/FM + Spectres</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      background: #fff;
      color: #111;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    .wrap {
      width: 960px;
      margin: 10px auto;
    }
    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 8px 12px;
      align-items: center;
    }
    .row {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }
    label { font-size: 12px; color: #222; }
    input[type="range"] { width: 100%; }
    .kv {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .val {
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      color: #333;
      min-width: 64px;
      text-align: right;
    }
    canvas {
      display: block;
      width: 960px;
      height: 700px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
    }
    .hint { font-size: 12px; color: #555; margin-top: 8px; }
    .legend {
      font-size: 12px;
      color: #333;
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }
    .chip {
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      display: inline-block;
      border: 1px solid rgba(0,0,0,.2);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="row" style="justify-content: space-between;">
        <div class="legend">
          <span class="chip"><span class="dot" style="background:#777"></span>Original</span>
          <span class="chip"><span class="dot" style="background:#1f77b4"></span>AM</span>
          <span class="chip"><span class="dot" style="background:#d62728"></span>FM</span>
        </div>
        <div class="row">
          <label><input type="radio" name="mode" value="am" checked> Afficher AM (en haut)</label>
          <label><input type="radio" name="mode" value="fm"> Afficher FM (en haut)</label>
        </div>
      </div>

      <div class="grid" style="margin-top: 10px;">
        <div class="kv">
          <label>Fondamentale f0 (Hz)</label>
          <span class="val" id="v_f0"></span>
          <input id="f0" type="range" min="40" max="880" value="220" step="1" style="grid-column: 1 / -1;">
        </div>

        <div class="kv">
          <label>Nb harmoniques</label>
          <span class="val" id="v_h"></span>
          <input id="harm" type="range" min="1" max="64" value="12" step="1" style="grid-column: 1 / -1;">
        </div>

        <div class="kv">
          <label>Décroissance (roll-off)</label>
          <span class="val" id="v_roll"></span>
          <input id="roll" type="range" min="0.0" max="2.5" value="1.0" step="0.05" style="grid-column: 1 / -1;">
        </div>

        <div class="kv">
          <label>f modulation (Hz)</label>
          <span class="val" id="v_fm"></span>
          <input id="fmod" type="range" min="0.2" max="60" value="5" step="0.1" style="grid-column: 1 / -1;">
        </div>

        <div class="kv">
          <label>AM profondeur (0..1)</label>
          <span class="val" id="v_am"></span>
          <input id="amDepth" type="range" min="0" max="1" value="0.6" step="0.01" style="grid-column: 1 / -1;">
        </div>

        <div class="kv">
          <label>FM index β</label>
          <span class="val" id="v_beta"></span>
          <input id="beta" type="range" min="0" max="10" value="2.5" step="0.05" style="grid-column: 1 / -1;">
        </div>

        <div class="kv">
          <label>Zoom temps (ms affichées)</label>
          <span class="val" id="v_ms"></span>
          <input id="tms" type="range" min="5" max="60" value="20" step="1" style="grid-column: 1 / -1;">
        </div>

        <div class="kv">
          <label>Max spectre (Hz)</label>
          <span class="val" id="v_fmax"></span>
          <input id="fmax" type="range" min="500" max="12000" value="5000" step="50" style="grid-column: 1 / -1;">
        </div>
      </div>

      <div class="hint">
        Remarque : la FM est appliquée à chaque harmonique via une modulation de phase :
        <code>sin(2πk f0 t + k β sin(2π fmod t))</code>.
      </div>
    </div>

    <canvas id="c" width="960" height="700"></canvas>
  </div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  const ui = {
    f0: document.getElementById('f0'),
    harm: document.getElementById('harm'),
    roll: document.getElementById('roll'),
    fmod: document.getElementById('fmod'),
    amDepth: document.getElementById('amDepth'),
    beta: document.getElementById('beta'),
    tms: document.getElementById('tms'),
    fmax: document.getElementById('fmax'),
    mode: () => document.querySelector('input[name="mode"]:checked').value
  };

  const labels = {
    v_f0: document.getElementById('v_f0'),
    v_h: document.getElementById('v_h'),
    v_roll: document.getElementById('v_roll'),
    v_fm: document.getElementById('v_fm'),
    v_am: document.getElementById('v_am'),
    v_beta: document.getElementById('v_beta'),
    v_ms: document.getElementById('v_ms'),
    v_fmax: document.getElementById('v_fmax'),
  };

  function updateLabels() {
    labels.v_f0.textContent = `${(+ui.f0.value).toFixed(0)} Hz`;
    labels.v_h.textContent = `${(+ui.harm.value)|0}`;
    labels.v_roll.textContent = `${(+ui.roll.value).toFixed(2)}`;
    labels.v_fm.textContent = `${(+ui.fmod.value).toFixed(1)} Hz`;
    labels.v_am.textContent = `${(+ui.amDepth.value).toFixed(2)}`;
    labels.v_beta.textContent = `${(+ui.beta.value).toFixed(2)}`;
    labels.v_ms.textContent = `${(+ui.tms.value).toFixed(0)} ms`;
    labels.v_fmax.textContent = `${(+ui.fmax.value).toFixed(0)} Hz`;
  }

  // --- FFT (radix-2, in-place) ---
  function fftRadix2(re, im) {
    const n = re.length;
    // bit-reversal
    for (let i = 1, j = 0; i < n; i++) {
      let bit = n >> 1;
      for (; j & bit; bit >>= 1) j ^= bit;
      j ^= bit;
      if (i < j) {
        [re[i], re[j]] = [re[j], re[i]];
        [im[i], im[j]] = [im[j], im[i]];
      }
    }
    // butterflies
    for (let len = 2; len <= n; len <<= 1) {
      const ang = -2 * Math.PI / len;
      const wlenRe = Math.cos(ang);
      const wlenIm = Math.sin(ang);
      for (let i = 0; i < n; i += len) {
        let wRe = 1, wIm = 0;
        for (let j = 0; j < (len >> 1); j++) {
          const uRe = re[i + j], uIm = im[i + j];
          const vRe = re[i + j + (len >> 1)] * wRe - im[i + j + (len >> 1)] * wIm;
          const vIm = re[i + j + (len >> 1)] * wIm + im[i + j + (len >> 1)] * wRe;

          re[i + j] = uRe + vRe;
          im[i + j] = uIm + vIm;
          re[i + j + (len >> 1)] = uRe - vRe;
          im[i + j + (len >> 1)] = uIm - vIm;

          const nextWRe = wRe * wlenRe - wIm * wlenIm;
          const nextWIm = wRe * wlenIm + wIm * wlenRe;
          wRe = nextWRe; wIm = nextWIm;
        }
      }
    }
  }

  function hann(n, N) {
    return 0.5 * (1 - Math.cos(2 * Math.PI * n / (N - 1)));
  }

  function db(x) {
    return 20 * Math.log10(Math.max(1e-12, x));
  }

  function computeSpectrum(signal, sampleRate) {
    // N must be power of 2
    const N = signal.length;
    const re = new Float64Array(N);
    const im = new Float64Array(N);
    // window + copy
    for (let i = 0; i < N; i++) {
      const w = hann(i, N);
      re[i] = signal[i] * w;
      im[i] = 0;
    }
    fftRadix2(re, im);
    const half = N >> 1;
    const magsDb = new Float32Array(half);
    // normalize roughly (window loss not fully compensated; OK for display)
    const norm = 1 / (N * 0.5);
    for (let k = 0; k < half; k++) {
      const mag = Math.hypot(re[k], im[k]) * norm;
      magsDb[k] = db(mag);
    }
    return magsDb;
  }

  function normalizeInPlace(x) {
    let m = 0;
    for (let i = 0; i < x.length; i++) m = Math.max(m, Math.abs(x[i]));
    if (m < 1e-12) return x;
    const s = 1 / m;
    for (let i = 0; i < x.length; i++) x[i] *= s;
    return x;
  }

  // --- synthesis & modulation ---
  function genWaves(params) {
    const { sampleRate, N, f0, H, roll, fmod, amDepth, beta } = params;
    const orig = new Float32Array(N);
    const am = new Float32Array(N);
    const fm = new Float32Array(N);

    // harmonic amplitudes
    const a = new Float32Array(H + 1);
    let sumA = 0;
    for (let k = 1; k <= H; k++) {
      a[k] = 1 / Math.pow(k, roll);
      sumA += a[k];
    }
    const invSum = sumA > 0 ? (1 / sumA) : 1;

    for (let n = 0; n < N; n++) {
      const t = n / sampleRate;
      const mod = Math.sin(2 * Math.PI * fmod * t);
      const env = 1 + amDepth * mod; // AM (DSB with carrier)

      let s0 = 0;
      let sFm = 0;
      for (let k = 1; k <= H; k++) {
        const ak = a[k] * invSum;
        const ph0 = 2 * Math.PI * (k * f0) * t;
        s0 += ak * Math.sin(ph0);

        // FM via phase modulation: sin(2πk f0 t + k β sin(2π fmod t))
        const phFm = ph0 + (k * beta * mod);
        sFm += ak * Math.sin(phFm);
      }
      orig[n] = s0;
      am[n] = s0 * env;
      fm[n] = sFm;
    }

    // normalize for display (spectra computed from these normalized signals too; stable visually)
    normalizeInPlace(orig);
    normalizeInPlace(am);
    normalizeInPlace(fm);

    return { orig, am, fm };
  }

  // --- drawing ---
  function clear() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function drawGrid(x, y, w, h, nx=10, ny=6) {
    ctx.save();
    ctx.strokeStyle = 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= nx; i++) {
      const xx = x + (w * i / nx);
      ctx.beginPath(); ctx.moveTo(xx, y); ctx.lineTo(xx, y + h); ctx.stroke();
    }
    for (let j = 0; j <= ny; j++) {
      const yy = y + (h * j / ny);
      ctx.beginPath(); ctx.moveTo(x, yy); ctx.lineTo(x + w, yy); ctx.stroke();
    }
    ctx.restore();
  }

  function drawFrame(x, y, w, h, title) {
    ctx.save();
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
    ctx.fillStyle = '#111';
    ctx.font = '12px system-ui, sans-serif';
    ctx.fillText(title, x + 10, y + 18);
    ctx.restore();
  }

  function drawWave(x, y, w, h, wave, color, samplesToShow) {
    const N = Math.min(samplesToShow, wave.length);
    ctx.save();
    ctx.beginPath();
    for (let i = 0; i < N; i++) {
      const xx = x + (i / (N - 1)) * w;
      const yy = y + h * 0.5 - wave[i] * (h * 0.42);
      if (i === 0) ctx.moveTo(xx, yy);
      else ctx.lineTo(xx, yy);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }

  function drawSpectrumPanel(x, y, w, h, magsDb, sampleRate, fMax, color, title) {
    drawFrame(x, y, w, h, title);
    drawGrid(x, y + 8, w, h - 8, 10, 6);

    const N2 = magsDb.length; // N/2
    const binHz = sampleRate / (N2 * 2);
    const maxBin = Math.min(N2 - 1, Math.floor(fMax / binHz));

    // scale dB range
    const dbMin = -100;
    const dbMax = 0;

    ctx.save();
    ctx.beginPath();
    for (let k = 0; k <= maxBin; k++) {
      const f = k * binHz;
      const xx = x + (f / fMax) * w;
      const v = magsDb[k];
      const clamped = Math.max(dbMin, Math.min(dbMax, v));
      const yy = y + h - ( (clamped - dbMin) / (dbMax - dbMin) ) * (h - 24) - 10;
      if (k === 0) ctx.moveTo(xx, yy);
      else ctx.lineTo(xx, yy);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.6;
    ctx.stroke();

    // axes labels (minimal)
    ctx.fillStyle = '#333';
    ctx.font = '11px system-ui, sans-serif';
    ctx.fillText(`0 Hz`, x + 8, y + h - 8);
    ctx.fillText(`${fMax|0} Hz`, x + w - 60, y + h - 8);
    ctx.fillText(`0 dB`, x + 8, y + 28);
    ctx.fillText(`${dbMin} dB`, x + 8, y + h - 28);
    ctx.restore();
  }

  // --- main render ---
  const sampleRate = 44100;
  const N = 2048; // power of 2 for FFT

  function render() {
    updateLabels();

    const f0 = +ui.f0.value;
    const H = (+ui.harm.value) | 0;
    const roll = +ui.roll.value;
    const fmod = +ui.fmod.value;
    const amDepth = +ui.amDepth.value;
    const beta = +ui.beta.value;
    const tms = +ui.tms.value;
    const fMax = +ui.fmax.value;

    const waves = genWaves({ sampleRate, N, f0, H, roll, fmod, amDepth, beta });

    const specOrig = computeSpectrum(waves.orig, sampleRate);
    const specAM = computeSpectrum(waves.am, sampleRate);
    const specFM = computeSpectrum(waves.fm, sampleRate);

    clear();

    // Layout
    const W = canvas.width, Hc = canvas.height - 250;

    const topX = 12, topY = 12, topW = W - 24, topH = 180;
    const botX = 12, botY = topY + topH + 12, botW = W - 24, botH = Hc - botY - 12;

    // Top waveform area
    drawFrame(topX, topY, topW, topH, `Forme d'onde (Original + ${ui.mode().toUpperCase()})`);
    drawGrid(topX, topY + 8, topW, topH - 8, 12, 6);

    // How many samples to show based on ms
    const samplesToShow = Math.max(64, Math.min(N, Math.floor(sampleRate * (tms / 1000))));
    // Midline
    ctx.save();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.moveTo(topX, topY + topH * 0.5);
    ctx.lineTo(topX + topW, topY + topH * 0.5);
    ctx.stroke();
    ctx.restore();

    // Original
    drawWave(topX, topY, topW, topH, waves.orig, '#777', samplesToShow);

    // Selected modulation overlay
    if (ui.mode() === 'am') {
      drawWave(topX, topY, topW, topH, waves.am, '#1f77b4', samplesToShow);
    } else {
      drawWave(topX, topY, topW, topH, waves.fm, '#d62728', samplesToShow);
    }

    // Bottom: 3 spectrum panels side-by-side
    const pad = 10;
    const panelW = (botW - 2 * pad) / 3;
    const panelH = botH;

    drawSpectrumPanel(botX + 0 * (panelW + pad), botY, panelW, panelH, specOrig, sampleRate, fMax, '#777', 'Spectre - Original');
    drawSpectrumPanel(botX + 1 * (panelW + pad), botY, panelW, panelH, specAM, sampleRate, fMax, '#1f77b4', 'Spectre - AM');
    drawSpectrumPanel(botX + 2 * (panelW + pad), botY, panelW, panelH, specFM, sampleRate, fMax, '#d62728', 'Spectre - FM');
  }

  // Events
  const inputs = document.querySelectorAll('input');
  inputs.forEach(el => el.addEventListener('input', render));
  inputs.forEach(el => el.addEventListener('change', render));

  updateLabels();
  render();
})();
</script>
</body>
</html>
